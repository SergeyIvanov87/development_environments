# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Docker Build Check

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      
jobs:
  build_check:
    name: Check Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker System-Development
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: is140608/sys_devel_env
          tags: |
            type=raw,value=latest
      - name: Build Docker System-Development image (no push)
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./system_development/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (tags, labels) for Docker Codex IDE
        id: codex_ide_meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: is140608/sys_devel_env
          tags: |
            type=raw,value=latest
      - name: Build Docker Codex IDE (no push)
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./ai_pow_development/codex_ide/Dockerfile
          push: false
          tags: ${{ steps.codex_ide_meta.outputs.tags }}
          labels: ${{ steps.codex_ide_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (tags, labels) for Docker Cursor IDE
        id: cursor_ide_meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: is140608/cursor_ide_env
          tags: |
            type=raw,value=latest
      - name: Build Docker Cursor IDE (no push)
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./ai_pow_development/cursor_ide/Dockerfile
          push: false
          tags: ${{ steps.cursor_ide_meta.outputs.tags }}
          labels: ${{ steps.cursor_ide_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
