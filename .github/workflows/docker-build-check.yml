name: Docker Build Check

on:
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build_check:
    name: Check Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Extract metadata (tags, labels) for Docker System-Development
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: is140608/sys_devel_env
          tags: |
            type=raw,value=latest
      - name: Build Docker System-Development image (no push)
        id: build
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./system_development/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Test System-Development image is runnable
        id: test_sysdevel_image
        run: |
          # Skip xhost if not on a display
          if [ -n "$DISPLAY" ]; then
            xhost +local:
          fi
          # Launch container in background
          CONTAINER_ID=$(docker run -d \
            --mount type=bind,src=./system_development,dst=/data \
            is140608/sys_devel_env:latest)
          echo "Container started with ID: $CONTAINER_ID"
          # Retry loop: 3 attempts to find the string in logs
          for i in 1 2 3; do
            echo "Check attempt $i/3..."
            # Check for the required string in logs
            if docker logs "$CONTAINER_ID" | grep -q "Preparing configuration..."; then
              echo "✓ Found 'Preparing configuration...' in container logs"
              # Clean up container
              docker stop "$CONTAINER_ID" || true
              docker rm "$CONTAINER_ID" || true
              exit 0
            fi
            # If not the last iteration, wait before retrying
            if [ $i -lt 3 ]; then
              echo "String not found yet, waiting 5 seconds before retry..."
              sleep 5
            fi
          done
          # All retries exhausted
          echo "✗ Error: 'Preparing configuration...' not found after 3 attempts"
          echo "Container logs:"
          docker logs "$CONTAINER_ID"
          # Clean up container
          docker stop "$CONTAINER_ID" || true
          docker rm "$CONTAINER_ID" || true
          exit 1

      - name: Extract metadata (tags, labels) for Docker Codex IDE
        id: codex_ide_meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: is140608/codex_ide_env
          tags: |
            type=raw,value=latest
      - name: Build Docker Codex IDE (no push)
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./ai_pow_development/codex_ide/Dockerfile
          push: false
          load: true
          tags: ${{ steps.codex_ide_meta.outputs.tags }}
          labels: ${{ steps.codex_ide_meta.outputs.labels }}
      - name: Test Codex IDE image is runnable
        id: test_codex_ide_image
        run: |
          # Skip xhost if not on a display
          if [ -n "$DISPLAY" ]; then
            xhost +local:
          fi
          # Launch container in background
          CONTAINER_ID=$(docker run -d \
            --mount type=bind,src=./ai_pow_development/codex_ide,dst=/data \
            is140608/codex_ide_env:latest)
          echo "Container started with ID: $CONTAINER_ID"
          # Retry loop: 3 attempts to find the string in logs
          for i in 1 2 3; do
            echo "Check attempt $i/3..."
            # Check for the required string in logs
            if docker logs "$CONTAINER_ID" | grep -q "Preparing configuration..."; then
              echo "✓ Found 'Preparing configuration...' in container logs"
              # Clean up container
              docker stop "$CONTAINER_ID" || true
              docker rm "$CONTAINER_ID" || true
              exit 0
            fi
            # If not the last iteration, wait before retrying
            if [ $i -lt 3 ]; then
              echo "String not found yet, waiting 5 seconds before retry..."
              sleep 5
            fi
          done
          # All retries exhausted
          echo "✗ Error: 'Preparing configuration...' not found after 3 attempts"
          echo "Container logs:"
          docker logs "$CONTAINER_ID"
          # Clean up container
          docker stop "$CONTAINER_ID" || true
          docker rm "$CONTAINER_ID" || true
          exit 1

      - name: Extract metadata (tags, labels) for Docker Cursor IDE
        id: cursor_ide_meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: is140608/cursor_ide_env
          tags: |
            type=raw,value=latest
      - name: Build Docker Cursor IDE (no push)
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./ai_pow_development/cursor_ide/Dockerfile
          push: false
          load: true
          tags: ${{ steps.cursor_ide_meta.outputs.tags }}
          labels: ${{ steps.cursor_ide_meta.outputs.labels }}
      - name: Test Cursor IDE image is runnable
        id: test_cursor_ide_image
        run: |
          # Skip xhost if not on a display
          if [ -n "$DISPLAY" ]; then
            xhost +local:
          fi
          # Launch container in background
          CONTAINER_ID=$(docker run -d \
            --mount type=bind,src=./ai_pow_development/cursor_ide,dst=/data \
            is140608/cursor_ide_env:latest)
          echo "Container started with ID: $CONTAINER_ID"
          # Retry loop: 3 attempts to find the string in logs
          for i in 1 2 3; do
            echo "Check attempt $i/3..."
            # Check for the required string in logs
            if docker logs "$CONTAINER_ID" | grep -q "Preparing configuration..."; then
              echo "✓ Found 'Preparing configuration...' in container logs"
              # Clean up container
              docker stop "$CONTAINER_ID" || true
              docker rm "$CONTAINER_ID" || true
              exit 0
            fi
            # If not the last iteration, wait before retrying
            if [ $i -lt 3 ]; then
              echo "String not found yet, waiting 5 seconds before retry..."
              sleep 5
            fi
          done
          # All retries exhausted
          echo "✗ Error: 'Preparing configuration...' not found after 3 attempts"
          echo "Container logs:"
          docker logs "$CONTAINER_ID"
          # Clean up container
          docker stop "$CONTAINER_ID" || true
          docker rm "$CONTAINER_ID" || true
          exit 1
